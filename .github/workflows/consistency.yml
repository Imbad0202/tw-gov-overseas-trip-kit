name: Security Gates

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  security-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Layer A — 機構字眼掃描
        run: bash scripts/check_no_pii.sh

      - name: Metadata 掃描（docx/xlsx docProps）
        run: bash scripts/check_metadata.sh

      - name: 版本一致性與必要宣告
        run: python scripts/check_consistency.py
